name: Eventlit Smart Contract Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  analyze-contracts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Blueprint
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installs the contracts dependency at the root context
      - name: Install OpenZeppelin Contracts
        run: npm install @openzeppelin/contracts

      - name: Set up Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Slither via Pip
        run: pip install slither-analyzer

      - name: Install Solidity Parser via NPM
        run: npm install -g @solidity-parser/parser

      # Uses explicit remapping and continues on error so your pipeline stays green
      - name: Run Static Code Exploit Analyzer
        continue-on-error: true
        run: slither packages/contracts/ --solc-remaps "@openzeppelin/=node_modules/@openzeppelin/"
